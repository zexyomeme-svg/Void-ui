services:
  - type: web
    name: void-nuke-web
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "python run.py --prod"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONDONTWRITEBYTECODE
        value: 1
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: false

# Notes:
# - PYTHON_VERSION 3.11.9 avoids Python 3.13 audioop removal issue
# - If using Python 3.13, audioop-lts in requirements.txt fixes it (shim in run.py/app.py/bot_manager.py)
# - run.py --prod uses gunicorn 1 worker + 2 threads = ~200-300MB fits 512MB free tier
# - All 39 original commands implemented in bot_manager.py
